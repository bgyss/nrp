# Non-nix toolchain pin + task runner. `mise trust` once, then `mise install`.
[tools]
python = "3.12"
uv = "latest"
ruff = "latest"

[tasks.sync]
description = "Create/refresh the uv venv with dev dependencies"
run = "uv sync"

[tasks.sync-all]
description = "uv sync including the mitsuba + oidn extras"
run = "uv sync --extra mitsuba --extra oidn"

[tasks.test]
description = "Run the unit test suite"
run = "uv run python -m unittest discover -s tests"

[tasks.lint]
description = "ruff check"
run = "uv run ruff check ."

[tasks.fmt]
description = "ruff format"
run = "uv run ruff format ."

[tasks.train]
description = "Train the numpy proxy on the toy scene (traces the cache if missing)"
run = "uv run python -m nrp.train --config examples/toy_sphere.json"

[tasks.train-torch]
description = "Train the torch proxy (hashgrid + denoised pool) on the toy scene"
run = "uv run python -m nrp.torch_backend.train --config examples/toy_sphere_torch.json"

[tasks.smoke]
description = "Fast end-to-end smoke: numpy train + relight + inverse on a tiny trace"
run = "uv run python -m unittest discover -s tests -p 'test_training_smoke.py'"

[tasks.export-mitsuba]
description = "Export the Mitsuba cornell box into a path cache (needs the mitsuba extra)"
run = "uv run python -m nrp.mitsuba_exporter --scene builtin:cornell-box --width 48 --height 48 --spp 16 --bounces 4 --out out/mitsuba/path_cache.npz"

[tasks.train-mitsuba]
description = "Train the torch proxy on the Mitsuba-exported cache with OIDN denoising"
run = "uv run python -m nrp.torch_backend.train --config examples/mitsuba_cornell_torch.json"

[tasks.export-kitchen]
description = "Download the Mitsuba gallery kitchen scene and export it at 128x128 / 64 spp"
run = [
  "uv run python examples/scenes/download_scene.py kitchen",
  "uv run python -m nrp.mitsuba_exporter --scene examples/scenes/kitchen/scene.xml --width 128 --height 128 --spp 64 --bounces 4 --out out/kitchen/path_cache.npz",
]

[tasks.train-kitchen]
description = "Train the torch proxy on the kitchen cache with OIDN denoising"
run = "uv run python -m nrp.torch_backend.train --config examples/kitchen_torch.json"

[tasks.train-volume]
description = "Train the torch proxy on the toy scene filled with a homogeneous medium"
run = "uv run python -m nrp.torch_backend.train --config examples/toy_sphere_volume_torch.json"

[tasks.volume-report]
description = "Measure volume-vs-surface cache growth, gather time, and proxy quality"
run = "uv run python examples/volume_report.py --out out/volume-report.json"

[tasks.bench-export]
description = "Benchmark the exporter: scalar loop vs drjit wavefront at 48x48 and 128x128"
run = "uv run python -m nrp.export_bench --out out/export-bench.json"

[tasks.bench]
description = "Benchmark proxy inference across resolutions on all available devices"
run = "uv run python -m nrp.torch_backend.bench --model out/toy-torch/model.pt --out out/bench.json"

[tasks.animate]
description = "Render an animated-light frame sequence from one resident torch proxy"
run = "uv run python -m nrp.torch_backend.animate --model out/toy-torch/model.pt --cache out/toy/path_cache.npz --keyframes examples/animated_lights.json --out-dir out/animate --measure-reference"

[tasks.time-camera]
description = "E1 animated-camera cache-keyframe interpolation baseline"
run = "uv run python examples/time_conditioned_camera.py --out out/time-camera/report.json"

[tasks.time-conditioned-proxy]
description = "E1: single TorchNRP proxy conditioned on time, held-out camera PSNR gap report"
run = "uv run python examples/time_conditioned_proxy.py --out out/time-camera/proxy_report.json"

[tasks.out-of-core]
description = "E5 foundation: sharded cache round-trip and tiled inference report"
run = "uv run python examples/out_of_core.py --out out/out-of-core/report.json"

[tasks.streamed-torchnrp]
description = "E5: streamed vs monolithic TorchNRP pool training parity report"
run = "uv run python examples/streamed_torchnrp_train.py --out out/out-of-core/streamed_torchnrp_report.json"

[tasks.export-mitsuba-512]
description = "Export a 512x512/128spp Mitsuba cornell-box cache for the E5 production-scale report (needs the mitsuba extra)"
run = "uv run python -m nrp.mitsuba_exporter --scene builtin:cornell-box --width 512 --height 512 --spp 128 --bounces 4 --out out/mitsuba-512/path_cache.npz"

[tasks.mitsuba-512-streamed]
description = "E5 production-scale report: streamed TorchNRP training + tiled inference on the 512x512/128spp cache"
run = "uv run python examples/mitsuba_512_streamed.py --out out/out-of-core/mitsuba_512_report.json"

[tasks.t2-streaming]
description = "T2: packed-shard streaming and memory-budget proof on the T1 kitchen scene"
run = "uv run python examples/t2_real_scene_streaming.py --out out/t2-streaming/report.json"

[tasks.t2-export-memory]
description = "T2: measure full and reduced Country Kitchen exporter peak RSS"
run = [
  "uv run python -m nrp.mitsuba_exporter --scene examples/scenes/kitchen/scene.xml --width 512 --height 512 --spp 64 --bounces 4 --out out/t2-streaming/export_path_cache.npz --report out/t2-streaming/export_512x512_64spp.json",
  "uv run python -m nrp.mitsuba_exporter --scene examples/scenes/kitchen/scene.xml --width 128 --height 128 --spp 64 --bounces 4 --out out/t2-streaming/export_path_cache_128.npz --report out/t2-streaming/export_128x128_64spp.json",
]

[tasks.t2]
description = "Complete T2 real-scene export, packed streaming, parity, and memory report"
run = [
  "mise run t2-export-memory",
  "mise run t2-streaming",
  "uv run python examples/audit_pipeline_claims.py --doc docs/production-track.md --out out/t2-streaming/audit.json",
]

[tasks.quality-tiers]
description = "E9 quality ladder: preview/draft/final/residual report"
run = "uv run python examples/quality_tiers.py --out out/quality/report.json"

[tasks.quality-tiers-production]
description = "E9 production-scale (512x512) quality-tier ladder and trust verdict (needs out/mitsuba-512{,-draft}/path_cache.npz)"
run = "uv run python examples/quality_tiers_production.py --out out/quality/production_report.json"

[tasks.gate-overhead]
description = "T3 measure: quality-gate evaluation overhead vs render time at 512x512 (needs the T1 kitchen cache + model)"
run = "uv run python examples/gate_overhead.py --cache out/kitchen-512/path_cache.npz --model out/kitchen-512-torch/model.pt --out out/quality/gate_overhead.json"

[tasks.production-controls]
description = "E8 gather-time light linking and attenuation report"
run = "uv run python examples/production_controls.py --out out/production-controls/report.json"

[tasks.environment-fit]
description = "E4 environment SH inverse recovery report"
run = "uv run python examples/environment_fit.py --out out/environment-fit/report.json"

[tasks.textured-quad-fit]
description = "E4 textured-quad inverse recovery and texture-resolution report"
run = "uv run python examples/textured_quad_fit.py --out out/textured-quad-fit/report.json"

[tasks.g2-export]
description = "G2: export the kitchen demo blobs (controls included, G2's longer-trained proxy) and the G1 moving-object panel blobs"
run = "uv run python examples/export_webgpu_demo.py --model out/kitchen-512-torch-g2/model.pt && uv run python examples/export_webgpu_demo.py --g1"

[tasks.g2-serve]
description = "G2: serve the interactive browser demo (open http://localhost:8791/webgpu/demo/index.html)"
run = "node webgpu/demo/server.mjs"

[tasks.g2-demo]
description = "G2: replay the committed interaction trace in real Chrome — frame-time histogram (p95 <= 33 ms gate), screen recording, and gate-sample frames"
run = "cd webgpu && npm install --silent && npx playwright install chrome && node demo_g2.mjs"

[tasks.g2-gate]
description = "G2: gate every sampled trace frame at preview tier against controlled GATHERLIGHT references"
run = "uv run python examples/g2_gate.py"

[tasks.f1-shot]
description = "F1: 120-frame keyframed-light shot on the T1 kitchen through the tier ladder — per-frame T3 verdicts + temporal FLIP-delta check (needs the nix devshell for OIDN)"
run = "uv run python -m nrp.torch_backend.shot --model out/kitchen-512-torch-g2/model.pt --cache out/kitchen-512/path_cache.npz --keyframes examples/f1_shot_kitchen.json --out-dir out/f1-shot"

[tasks.f2-shot]
description = "F2 summit: the F1 shot at final tier — fp16 residual-identity frames, per-frame final-tier gate, committed MP4, storage + amortization accounting (needs the nix devshell for OIDN)"
run = "uv run python examples/f2_final_shot.py --model out/kitchen-512-torch-g2/model.pt --cache out/kitchen-512/path_cache.npz --keyframes examples/f1_shot_kitchen.json --out-dir out/f2-shot"

[tasks.g1-residual]
description = "G1: E2-fixture recovery comparison — frozen base + shard-partitioned residual vs E2's fine-tune regimes"
run = "uv run python examples/residual_dynamic.py"

[tasks.dynamic-geometry]
description = "E2 one-bounce dynamic-geometry invalidation and cache-splice report"
run = "uv run python examples/dynamic_geometry.py --out out/dynamic-geometry/report.json"

[tasks.light-aware-sampling]
description = "E3 light-aware toy-tracer sampling density and consistency report"
run = "uv run python examples/light_aware_sampling.py --out out/light-aware-sampling/report.json"

[tasks.light-aware-proxy-ab]
description = "E3 toy standard-vs-guided proxy A/B report"
run = "uv run python examples/light_aware_proxy_ab.py --out out/light-aware-proxy-ab/report.json"

[tasks.pipeline-audit]
description = "E10 audit: verify pipeline feasibility doc references existing out/ artifacts"
run = "uv run python examples/audit_pipeline_claims.py --doc docs/pipeline-feasibility.md --out out/pipeline-feasibility/audit.json"

[tasks.viewer]
description = "E6 exported-runtime headless viewer loop and parity report"
run = "uv run python examples/engine_runtime.py --out out/engine-runtime/report.json"

[tasks.js-viewer]
description = "E6: export a JS-backend GUI slider viewer (WebGPU-shaped step) and parity report"
run = "uv run python examples/export_js_viewer.py --out-dir out/engine-runtime/js_viewer"

[tasks.webgpu-smoke]
description = "E6: verify the real WebGPU compute pipeline mechanism (synthetic weights; see webgpu/README.md for why the native Node binding crashes on real weights)"
run = "cd webgpu && npm install --silent && node smoke.mjs"

[tasks.webgpu-bench]
description = "E6: the completed WebGPU backend — real compute shader in real Chrome (via Playwright) against the actual exported proxy, parity + 128/256/512 latency sweep"
run = "cd webgpu && npm install --silent && npx playwright install chrome && node bench_browser.mjs"

[tasks.t4-export]
description = "T4: export the T1-scene proxy (hashgrid included) + real G-buffer + PyTorch reference as WebGPU-consumable blobs"
run = "uv run python examples/export_webgpu_runtime.py --model out/kitchen-512-torch/model.pt --cache out/kitchen-512/path_cache.npz --out-dir out/t4-runtime/export"

[tasks.t4-bench]
description = "T4: frame-time histogram (mean/p95 at 128/256/512^2) of the T1-scene proxy in real Chrome WebGPU; writes out/t4-runtime/report.json"
run = "cd webgpu && npm install --silent && npx playwright install chrome && node bench_t4.mjs"

[tasks.t4-check]
description = "T4: regression gate — fails if parity breaks, p95 frame time regresses >30% vs the committed baseline, or 512^2 misses the 30 fps p95 floor"
run = "cd webgpu && npm install --silent && npx playwright install chrome && node bench_t4.mjs --check"

[tasks.h4-export]
description = "H4: export the H2 8-light rig (all lights, any type) to the WGSL rig-compositor's blob format"
run = "uv run python examples/export_webgpu_rig.py --rig out/h2-rig/rig.json --models-dir out/h2-rig/models --cache out/kitchen-512/path_cache.npz --out-dir out/h4-rig-export"

[tasks.h4-bench]
description = "H4: N-light rig compositing in real Chrome WebGPU — GPU-vs-CPU parity, per-light marginal cost, scripted slider-session latency; writes out/h4-rig/report.json"
run = "cd webgpu && npm install --silent && npx playwright install chrome && node bench_h4.mjs"

[tasks.generative-loop]
description = "E7 scribble/generative target inverse-lighting report"
run = "uv run python examples/generative_loop.py --out out/generative/report.json"

[tasks.hand-authored-target]
description = "E7: hand-authored (not derived-from-render) image target inverse-lighting report"
run = "uv run python examples/hand_authored_target.py --out out/generative/hand_authored_report.json"

[tasks.inverse-grid]
description = "Table-3-style grid: N in {1,3,5} lights x pixel fractions, 5 runs/cell (Mitsuba cornell)"
run = "uv run python examples/inverse_grid.py --model out/mitsuba-torch/model.pt --cache out/mitsuba/path_cache.npz --out out/inverse-grid/report.json"

[tasks.quad-check]
description = "Train a toy quad proxy and verify 1-light quad recovery (center error < 0.05)"
run = "uv run python examples/inverse_grid.py --quad-check --out out/inverse-grid/quad_check.json"

[tasks.layers]
description = "Per-layer compositing NRPs (§6.1/Fig. 11): layer caches, per-layer proxies, composite demo"
run = "uv run python examples/layers.py --out out/layers/report.json"

[tasks.multiview]
description = "Multi-view NRPs (§6.1): export 3 cornell-box views, train per-view proxies, measure edit latency"
run = "uv run python examples/multiview.py --out out/multiview/report.json"

[tasks.ablation]
description = "Table-2/Fig.-7 component ablation x spp sweep on the Mitsuba cornell box"
run = "uv run python examples/ablation.py --out out/ablation/report.json"

[tasks.bench-gather]
description = "Benchmark GATHERLIGHT: numpy vs batched torch (cpu/mps) on three cache sizes"
run = "uv run python -m nrp.torch_backend.bench --model out/toy-torch/model.pt --resolutions 48 --gather-caches out/toy/path_cache.npz out/mitsuba/path_cache_128.npz out/mitsuba/path_cache_256.npz --out out/gather-bench.json"

[tasks.v1-rig]
description = "V1: 8-light production rig on the T1 kitchen — per-light layered proxies, solo/mute, additivity vs monolithic baseline"
run = "uv run python examples/v1_rig.py --cache out/kitchen-512/path_cache.npz --out-dir out/v1-rig"

[tasks.v2-artloop]
description = "V2 summit: E7 color recovery driving the full V1 rig toward a hand-authored target, then a headless interactive-grading loop"
run = "uv run python examples/v2_art_loop.py --rig out/v1-rig/rig.json --models-dir out/v1-rig/models --cache out/kitchen-512/path_cache.npz --out-dir out/v2-artloop"
